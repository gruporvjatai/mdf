<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RV Portal Madeiras</title>
    
    <!-- Tailwind e Lucide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Nosso arquivo de configuração (com as chaves) -->
    <script src="config.js"></script>
    
    <!-- Ícones e manifesto -->
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="shortcut icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="application-name" content="RV Portal Madeiras">
    <meta name="apple-mobile-web-app-title" content="RV Portal Madeiras">
    <meta name="theme-color" content="#1e293b">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid #b8a94e;   /* amarelo do nosso sistema */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <!-- Cabeçalho com logo -->
        <div class="bg-slate-900 p-8 flex flex-col items-center">
            <div class="w-24 h-24 rounded-full border-4 border-[#b8a94e] mb-4 shadow-lg bg-white overflow-hidden p-1">
                <img src="logo.png" alt="Logo RV Portal Madeiras" class="w-full h-full object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                <div class="hidden w-full h-full items-center justify-center text-[#b8a94e] font-bold text-xl">RV</div>
            </div>
            <h1 class="text-2xl font-bold tracking-wider text-white">RV PORTAL MADEIRAS</h1>
            <p class="text-[#DBCC79] text-sm font-medium mt-1">Acesso ao Sistema</p>
        </div>

        <!-- Formulário de login -->
        <div class="p-8">
            <form id="loginForm" onsubmit="fazerLogin(event)" class="space-y-5">
                
                <!-- Mensagem de erro -->
                <div id="msg-erro" class="hidden bg-red-50 text-red-600 p-3 rounded-lg text-sm text-center font-bold border border-red-200">
                    Usuário ou senha incorretos.
                </div>

                <!-- Campo usuário/email -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">E‑mail</label>
                    <div class="relative">
                        <i data-lucide="mail" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                        <input type="text" id="login_user" required placeholder="Seu e‑mail cadastrado" class="w-full p-3 pl-10 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[#b8a94e] outline-none bg-slate-50">
                    </div>
                </div>

                <!-- Campo senha (somente números) -->
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Senha (somente números)</label>
                    <div class="relative">
                        <i data-lucide="lock" class="absolute left-3 top-3 text-slate-400 w-5 h-5"></i>
                        <input type="password" 
                               id="senha" 
                               inputmode="numeric" 
                               pattern="[0-9]*" 
                               placeholder="••••••" 
                               oninput="this.value = this.value.replace(/[^0-9]/g, '')" 
                               class="w-full p-3 pl-10 border border-slate-300 rounded-xl focus:ring-2 focus:ring-[#b8a94e] outline-none bg-slate-50">
                    </div>
                </div>

                <!-- Botão Entrar -->
                <button type="submit" id="btn-login" class="w-full py-3 bg-[#b8a94e] hover:bg-[#9b8a3b] text-slate-900 font-bold rounded-xl shadow-lg transition-all flex items-center justify-center gap-2 mt-4">
                    <span>Entrar no Sistema</span>
                    <i data-lucide="arrow-right" class="w-5 h-5"></i>
                </button>
                
                <!-- Indicador de carregamento -->
                <div id="loading" class="hidden justify-center items-center gap-2 py-3 mt-4">
                    <div class="loader"></div>
                    <span class="text-slate-500 font-bold text-sm">Validando...</span>
                </div>
                
            </form>
        </div>
    </div>

    <script>
        // Inicializa ícones Lucide
        lucide.createIcons();

        // Obtém as credenciais do arquivo config.js
        const SUPABASE_URL = CONFIG.SUPABASE_URL;
        const SUPABASE_KEY = CONFIG.SUPABASE_KEY;

        // Cria a instância do Supabase
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fazerLogin(e) {
            e.preventDefault();
            
            const login_user = document.getElementById('login_user').value.trim().toLowerCase();
            const senha = document.getElementById('senha').value;
            const btn = document.getElementById('btn-login');
            const load = document.getElementById('loading');
            const msgErro = document.getElementById('msg-erro');

            // Exibe o loading e esconde o botão
            btn.classList.add('hidden');
            load.classList.remove('hidden');
            load.classList.add('flex');
            msgErro.classList.add('hidden');

            try {
                // Busca o usuário na tabela mdf_usuarios
                const { data, error } = await sb
                    .from('mdf_usuarios')
                    .select('*')
                    .eq('email', login_user)          // campo de e‑mail
                    .eq('senha', senha)               // senha numérica
                    .eq('status', 'ATIVO')            // somente usuários ativos
                    .single();

                if (error || !data) {
                    throw new Error("Credenciais inválidas");
                }

                // Salva os dados do usuário na sessão (localStorage)
                localStorage.setItem('rv_user', JSON.stringify({
                    id: data.id,
                    nome: data.nome,
                    email: data.email,
                    nivel: data.nivel_acesso       // ou o campo que define permissões
                }));

                // Redireciona para o sistema principal
                window.location.href = 'sistema.html';   // ajuste o nome do arquivo do seu sistema

            } catch (err) {
                // Reexibe o botão e esconde o loading
                btn.classList.remove('hidden');
                load.classList.add('hidden');
                load.classList.remove('flex');
                msgErro.classList.remove('hidden');
            }
        }

        // Permite enviar com Enter
        document.getElementById('senha').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                fazerLogin(e);
            }
        });
    </script>
</body>
</html>
